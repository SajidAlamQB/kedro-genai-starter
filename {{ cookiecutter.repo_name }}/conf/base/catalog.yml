dialogs:
  type: partitions.IncrementalDataset
  path: data/01_raw/dialogs/
  dataset:
    type: json.JSONDataset

"{default_dataset}":
  type: MemoryDataset
  copy_mode: "assign"

# DeepLake Vector Store (local file-based)
deeplake_vector_store_init:
  type: {{ cookiecutter.python_package }}.datasets.DeeplakeVectorStoreDataset
  path: data/02_intermediate/deeplake_vector_store/
  overwrite: True

deeplake_vector_store_load:
  type: {{ cookiecutter.python_package }}.datasets.DeeplakeVectorStoreDataset
  path: data/02_intermediate/deeplake_vector_store/
  overwrite: False

# Pinecone Vector Store (cloud-based)
pinecone_vector_store_init:
  type: {{ cookiecutter.python_package }}.datasets.PineconeVectorStoreDataset
  dimension: 16384
  metric: "cosine"
  credentials: pinecone

pinecone_vector_store_load:
  type: {{ cookiecutter.python_package }}.datasets.PineconeVectorStoreDataset
  dimension: 16384
  metric: "cosine"
  credentials: pinecone

openai_llm:
 type: kedro_datasets_experimental.langchain.ChatOpenAIDataset
 kwargs:
   model: "gpt-3.5-turbo"
   temperature: 0.0
 credentials: openai

system_prompt:
  type: text.TextDataset
  filepath: data/01_raw/system_prompt.txt

user_interaction_output:
  type: text.TextDataset
  filepath: data/08_reporting/output.md
